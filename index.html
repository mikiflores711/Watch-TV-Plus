<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Bloqueo estricto de zoom para evitar que la pantalla se mueva en iPhone al escribir -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Web de TV Pro</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        :root {
            --color-fav: #ffcc00;
            --color-mexico: #00a650;
            --color-vix: #ff4500;
            --color-pluto: #00d2ff;
            --color-tubi: #ff9900;
            --color-espanol: #e50914;
            --color-roku: #662d91;
            --color-lg: #a50034;
            --color-plex: #e5a93b;
            --color-runtime: #0055ff;
            --color-adult: #ff007f;
            --border-default: #2d2d2d;
        }

        body { 
            background: #121212; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 15px; 
            padding-top: 290px; /* Espacio para la barra fija superior */
            box-sizing: border-box;
            -webkit-text-size-adjust: 100%; /* Evita cambios automáticos de texto en iOS */
        }
        
        /* CONTENEDOR FIJO SUPERIOR */
        .header-fijo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #121212;
            z-index: 1000;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.8);
        }
        
        .contenedor-reproductor {
            background: #000;
            display: none;
            width: 100%;
        }
        
        video {
            width: 100%;
            max-height: 210px;
            display: block;
            background: #000;
        }

        .contenedor-busqueda {
            padding: 12px 15px;
            background: #1a1a1a;
            border-bottom: 1px solid #2d2d2d;
            box-sizing: border-box;
        }
        /* Tamaño mínimo de 16px para desactivar el auto-zoom nativo de iOS al presionar */
        .barra-busqueda {
            width: 100%;
            padding: 12px 18px;
            border-radius: 25px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            font-size: 16px; 
            box-sizing: border-box;
            outline: none;
            -webkit-appearance: none; /* Estilo nativo limpio en iOS */
        }

        /* Selector de Listas / Categorías Responsivo */
        .selector-listas { 
            display: flex; 
            gap: 10px; 
            overflow-x: auto; 
            padding: 12px 15px; 
            scrollbar-width: none; 
            background: #121212;
            -webkit-overflow-scrolling: touch; /* Deslizamiento fluido en iOS */
        }
        .selector-listas::-webkit-scrollbar { display: none; }
        
        .btn-lista { 
            background: #222; 
            color: #ccc; 
            border: 2px solid #333; 
            padding: 8px 16px; 
            border-radius: 20px; 
            font-size: 13px; 
            font-weight: bold; 
            cursor: pointer; 
            white-space: nowrap; 
            transition: all 0.2s ease; 
        }
        
        /* Colores dinámicos para botones activos e iluminados globalmente */
        .btn-lista[data-cat="favoritos"].activo, .btn-lista[data-cat="favoritos"].iluminado { background: var(--color-fav); color: black; border-color: var(--color-fav); }
        .btn-lista[data-cat="mexico"].activo, .btn-lista[data-cat="mexico"].iluminado { background: var(--color-mexico); color: white; border-color: var(--color-mexico); }
        .btn-lista[data-cat="vix"].activo, .btn-lista[data-cat="vix"].iluminado { background: var(--color-vix); color: white; border-color: var(--color-vix); }
        .btn-lista[data-cat="pluto"].activo, .btn-lista[data-cat="pluto"].iluminado { background: var(--color-pluto); color: black; border-color: var(--color-pluto); }
        .btn-lista[data-cat="tubi"].activo, .btn-lista[data-cat="tubi"].iluminado { background: var(--color-tubi); color: black; border-color: var(--color-tubi); }
        .btn-lista[data-cat="espanol"].activo, .btn-lista[data-cat="espanol"].iluminado { background: var(--color-espanol); color: white; border-color: var(--color-espanol); }
        .btn-lista[data-cat="roku_all"].activo, .btn-lista[data-cat="roku_all"].iluminado { background: var(--color-roku); color: white; border-color: var(--color-roku); }
        .btn-lista[data-cat="LG_Channels_mx"].activo, .btn-lista[data-cat="LG_Channels_mx"].iluminado { background: var(--color-lg); color: white; border-color: var(--color-lg); }
        .btn-lista[data-cat="plex_mx"].activo, .btn-lista[data-cat="plex_mx"].iluminado { background: var(--color-plex); color: black; border-color: var(--color-plex); }
        .btn-lista[data-cat="runtime"].activo, .btn-lista[data-cat="runtime"].iluminado { background: var(--color-runtime); color: white; border-color: var(--color-runtime); }
        .btn-lista[data-cat="adult"].activo, .btn-lista[data-cat="adult"].iluminado { background: var(--color-adult); color: white; border-color: var(--color-adult); }

        h2 { text-align: center; font-size: 15px; color: #888; font-weight: normal; margin-top: 10px; margin-bottom: 20px; }

        /* Grid de Canales Auto-Responsivo */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
            gap: 12px; 
            max-width: 1000px; 
            margin: 0 auto; 
            padding-bottom: 40px; 
            box-sizing: border-box;
        }
        
        /* DISEÑO DE TARJETA */
        .canal { 
            background: #1e1e1e; 
            border-radius: 12px; 
            padding: 10px; 
            text-align: center; 
            border: 2px solid var(--border-default); 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            position: relative;
            user-select: none;
            -webkit-user-select: none;
            transition: transform 0.1s ease, background-color 0.1s ease;
            box-sizing: border-box;
        }
        
        /* EFECTO DE PULSACIÓN EN MÓVIL */
        .canal:active { 
            transform: scale(0.92); 
            background-color: #2a2a2a; 
        }
        
        .canal img { width: 100%; height: 60px; object-fit: contain; margin-bottom: 8px; border-radius: 6px; background: #1a1a1a; pointer-events: none; }
        .canal p { margin: 0; font-size: 12px; font-weight: 500; width: 100%; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.3; pointer-events: none; }
        
        .btn-favorito {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0,0,0,0.6);
            border: none;
            color: #555;
            font-size: 16px;
            cursor: pointer;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, color 0.2s;
            z-index: 10;
        }
        .btn-favorito:active { transform: scale(1.3); }
        .btn-favorito.en-favoritos { color: var(--color-fav); }
    </style>
</head>
<body>

    <!-- BLOQUE SUPERIOR FIJO (REPRODUCTOR, BUSCADOR Y CATEGORÍAS) -->
    <div class="header-fijo">
        <div class="contenedor-reproductor" id="wrapperPlayer">
            <video id="videoPlayer" controls playsinline webkit-playsinline></video>
        </div>
        
        <div class="contenedor-busqueda">
            <input type="text" id="inputBusqueda" class="barra-busqueda" placeholder="🔍 Buscar canales (Excluye adultos)..." oninput="filtrarBusqueda()">
        </div>

        <div class="selector-listas">
            <button class="btn-lista" data-cat="favoritos" onclick="cargarFavoritos(this)">⭐ Favoritos</button>
            <button class="btn-lista" data-cat="mexico" onclick="cargarLista('mexico.m3u', this)">México</button>
            <button class="btn-lista" data-cat="vix" onclick="cargarLista('vix.m3u', this)">Vix</button>
            <button class="btn-lista" data-cat="pluto" onclick="cargarLista('pluto.m3u', this)">Pluto</button>
            <button class="btn-lista" data-cat="tubi" onclick="cargarLista('tubi.m3u', this)">Tubi</button>
            <button class="btn-lista" data-cat="espanol" onclick="cargarLista('espanol.m3u', this)">Español</button>
            <button class="btn-lista" data-cat="roku_all" onclick="cargarLista('roku_all.m3u', this)">Roku</button>
            <button class="btn-lista" data-cat="LG_Channels_mx" onclick="cargarLista('LG_Channels_mx.m3u', this)">LG Channels</button>
            <button class="btn-lista" data-cat="plex_mx" onclick="cargarLista('plex_mx.m3u', this)">Plex</button>
            <button class="btn-lista" data-cat="runtime" onclick="cargarLista('runtime.m3u', this)">Runtime</button>
            <button class="btn-lista" data-cat="adult" onclick="cargarLista('adult.m3u', this)">Adultos</button>
        </div>
    </div>

    <h2 id="nombreLista">Selecciona una categoría</h2>
    <div class="grid" id="contenedorCanales"></div>
    <script>
        const video = document.getElementById('videoPlayer');
        const wrapper = document.getElementById('wrapperPlayer');
        let hlsInstance = null;
        
        let todosLosCanales = []; 
        let categoriaActual = "";
        let favoritos = JSON.parse(localStorage.getItem('tv_favoritos')) || [];

        const baseUrl = "https://mikiflores711.github.io/Watch-TV-Online/";

        const coloresCategorias = {
            'favoritos': 'var(--color-fav)',
            'mexico.m3u': 'var(--color-mexico)',
            'vix.m3u': 'var(--color-vix)',
            'pluto.m3u': 'var(--color-pluto)',
            'tubi.m3u': 'var(--color-tubi)',
            'espanol.m3u': 'var(--color-espanol)',
            'roku_all.m3u': 'var(--color-roku)',
            'LG_Channels_mx.m3u': 'var(--color-lg)',
            'plex_mx.m3u': 'var(--color-plex)',
            'runtime.m3u': 'var(--color-runtime)',
            'adult.m3u': 'var(--color-adult)'
        };

        window.onload = () => {
            const botonMexico = document.querySelector('[data-cat="mexico"]');
            if (botonMexico) botonMexico.click();
            precargarTodasLasListas();
        };

        async function precargarTodasLasListas() {
            const listas = ['mexico.m3u','vix.m3u','pluto.m3u','tubi.m3u','espanol.m3u','roku_all.m3u','LG_Channels_mx.m3u','plex_mx.m3u','runtime.m3u','adult.m3u'];
            for (const archivo of listas) {
                try {
                    const r = await fetch(baseUrl + archivo);
                    const data = await r.text();
                    parsearYGuardarGlobal(data, archivo);
                } catch(e) {}
            }
        }

        function parsearYGuardarGlobal(texto, archivo) {
            const textoLimpio = texto.replace(/\r/g, '');
            const lineas = textoLimpio.split('\n');
            let canalActual = null;
            
            lineas.forEach(linea => {
                linea = linea.trim();
                if (linea.startsWith('#EXTINF:')) {
                    let nombre = "Canal sin nombre";
                    let logo = 'https://placeholder.com';
                    
                    const infoLogo = linea.match(/tvg-logo="([^"]+)"/);
                    if (infoLogo && infoLogo[1]) logo = infoLogo[1];
                    
                    const indiceComa = linea.lastIndexOf(',');
                    if (indiceComa !== -1) nombre = linea.substring(indiceComa + 1).trim();
                    canalActual = { nombre, logo, archivo };
                } else if (linea.startsWith('http') && canalActual) {
                    canalActual.url = linea;
                    if(!todosLosCanales.some(c => c.url === canalActual.url)) {
                        todosLosCanales.push(canalActual);
                    }
                    canalActual = null;
                }
            });
        }

        function limpiarIluminacionBotones() {
            document.querySelectorAll('.btn-lista').forEach(btn => {
                btn.classList.remove('activo', 'iluminado');
            });
        }

        function cargarLista(archivoM3u, boton) {
            document.getElementById('inputBusqueda').value = ""; 
            categoriaActual = archivoM3u;
            
            limpiarIluminacionBotones();
            boton.classList.add('activo');
            document.getElementById('nombreLista').innerText = `Cargando: ${boton.innerText}...`;

            const contenedor = document.getElementById('contenedorCanales');
            contenedor.innerHTML = '';

            fetch(baseUrl + archivoM3u)
                .then(response => response.text())
                .then(data => {
                    const canalesDeLista = parsearM3U(data, archivoM3u);
                    renderizarArregloCanales(canalesDeLista);
                    document.getElementById('nombreLista').innerText = `${boton.innerText}`;
                })
                .catch(() => {
                    document.getElementById('nombreLista').innerText = `Error al cargar ${boton.innerText}`;
                });
        }

        function parsearM3U(texto, archivo) {
            const textoLimpio = texto.replace(/\r/g, '');
            const lineas = textoLimpio.split('\n');
            const listaResultado = [];
            let canalActual = null;

            lineas.forEach(linea => {
                linea = linea.trim();
                if (linea.startsWith('#EXTINF:')) {
                    let nombre = "Canal sin nombre";
                    let logo = 'https://placeholder.com';
                    
                    const infoLogo = linea.match(/tvg-logo="([^"]+)"/);
                    if (infoLogo && infoLogo[1]) logo = infoLogo[1];
                    
                    const indiceComa = linea.lastIndexOf(',');
                    if (indiceComa !== -1) nombre = linea.substring(indiceComa + 1).trim();
                    
                    canalActual = { nombre, logo, archivo };
                } else if (linea.startsWith('http') && canalActual) {
                    canalActual.url = linea;
                    listaResultado.push(canalActual);
                    canalActual = null;
                }
            });
            return listaResultado;
        }
        function cargarFavoritos(boton) {
            document.getElementById('inputBusqueda').value = ""; 
            categoriaActual = "favoritos";
            limpiarIluminacionBotones();
            boton.classList.add('activo');
            document.getElementById('nombreLista').innerText = "⭐ Tus Canales Favoritos";
            renderizarArregloCanales(favoritos);
        }

        function crearTarjetaCanal(canal, contenedor) {
            const div = document.createElement('div');
            div.className = 'canal';
            
            const colorBorde = coloresCategorias[canal.archivo] || 'var(--border-default)';
            div.style.borderColor = colorBorde;

            const esFav = favoritos.some(f => f.url === canal.url);
            const estrellaClase = esFav ? 'en-favoritos' : '';

            div.innerHTML = `
                <button class="btn-favorito ${estrellaClase}">★</button>
                <img src="${canal.logo}" alt="${canal.nombre}" onerror="this.src='https://placeholder.com'">
                <p>${canal.nombre}</p>
            `;
            
            div.querySelector('.btn-favorito').onclick = (e) => {
                e.stopPropagation();
                alternarFavorito(e.target, canal);
            };
            
            div.onclick = (e) => {
                if(e.target.classList.contains('btn-favorito')) return;
                playCanal(canal.url);
            };

            contenedor.appendChild(div);
        }

        function alternarFavorito(botonEstre, canal) {
            const index = favoritos.findIndex(f => f.url === canal.url);
            if (index > -1) {
                favoritos.splice(index, 1);
                botonEstre.classList.remove('en-favoritos');
            } else {
                favoritos.push(canal);
                botonEstre.classList.add('en-favoritos');
            }
            
            localStorage.setItem('tv_favoritos', JSON.stringify(favoritos));
            
            if (categoriaActual === "favoritos") {
                renderizarArregloCanales(favoritos);
            }
        }

        function renderizarArregloCanales(arreglo) {
            const contenedor = document.getElementById('contenedorCanales');
            contenedor.innerHTML = '';
            if(arreglo.length === 0) {
                contenedor.innerHTML = `<p style="grid-column: 1/-1; color: #666; text-align:center; margin-top:20px;">No hay canales para mostrar aquí.</p>`;
                return;
            }
            arreglo.forEach(canal => crearTarjetaCanal(canal, contenedor));
        }

        function filtrarBusqueda() {
            const texto = document.getElementById('inputBusqueda').value.toLowerCase().trim();
            limpiarIluminacionBotones();
            
            if (texto === "") {
                const btnMex = document.querySelector('[data-cat="mexico"]');
                if(btnMex) btnMex.click();
                return;
            }

            document.getElementById('nombreLista').innerText = `Resultados para: "${texto}"`;

            const resultados = todosLosCanales.filter(canal => {
                const coincideTexto = canal.nombre.toLowerCase().includes(texto);
                const noEsAdulto = canal.archivo !== 'adult.m3u'; 
                return coincideTexto && noEsAdulto;
            });

            const archivosConResultados = new Set(resultados.map(c => c.archivo));
            archivosConResultados.forEach(archivo => {
                const nombreCat = archivo.replace('.m3u', '');
                const botonCorrespondiente = document.querySelector(`[data-cat="${nombreCat}"]`);
                if (botonCorrespondiente) {
                    botonCorrespondiente.classList.add('iluminado');
                }
            });

            renderizarArregloCanales(resultados);
        }

        function playCanal(url) {
            wrapper.style.display = "block";

            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }

            if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            } else if (Hls.isSupported()) {
                hlsInstance = new Hls();
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                });
            }
        }
    </script>
</body>
</html>
