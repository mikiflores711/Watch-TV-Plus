<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Web de TV</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { background: #121212; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 20px; }
        h1, h2 { text-align: center; }
        h1 { font-size: 24px; margin-bottom: 5px; }
        h2 { font-size: 16px; color: #888; font-weight: normal; margin-bottom: 25px; }
        
        /* Selector de Listas / Categorías */
        .selector-listas { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 25px; scrollbar-width: none; }
        .selector-listas::-webkit-scrollbar { display: none; }
        .btn-lista { background: #222; color: #ccc; border: 1px solid #333; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: bold; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .btn-lista.activo { background: #007aff; color: white; border-color: #007aff; }

        /* Grid de Canales */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; max-width: 1000px; margin: 0 auto; }
        .canal { background: #1e1e1e; border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #2d2d2d; transition: transform 0.2s; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .canal:active { transform: scale(0.95); }
        .canal img { width: 100%; height: 65px; object-fit: contain; margin-bottom: 10px; border-radius: 6px; background: #1a1a1a; }
        .canal p { margin: 0; font-size: 13px; font-weight: 500; width: 100%; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.3; }
        
        video { display: none; width: 100%; height: auto; }
    </style>
</head>
<body>

    <h1>Mi TV en Vivo</h1>
    <h2 id="nombreLista">Selecciona una categoría</h2>

    <!-- Menú de categorías basado en tus archivos reales de GitHub -->
    <div class="selector-listas">
        <button class="btn-lista" onclick="cargarLista('mexico.m3u', this)">México</button>
        <button class="btn-lista" onclick="cargarLista('vix.m3u', this)">Vix</button>
        <button class="btn-lista" onclick="cargarLista('pluto.m3u', this)">Pluto</button>
        <button class="btn-lista" onclick="cargarLista('tubi.m3u', this)">Tubi</button>
        <button class="btn-lista" onclick="cargarLista('espanol.m3u', this)">Español</button>
        <button class="btn-lista" onclick="cargarLista('roku_all.m3u', this)">Roku</button>
        <button class="btn-lista" onclick="cargarLista('LG_Channels_mx.m3u', this)">LG Channels</button>
        <button class="btn-lista" onclick="cargarLista('plex_mx.m3u', this)">Plex</button>
        <button class="btn-lista" onclick="cargarLista('runtime.m3u', this)">Runtime</button>
        <button class="btn-lista" onclick="cargarLista('adult.m3u', this)">Adultos</button>
    </div>

    <!-- Contenedor donde aparecerán los canales -->
    <div class="grid" id="contenedorCanales"></div>
    
    <!-- Reproductor oculto para disparar el modo nativo -->
    <video id="videoPlayer" controls></video>

    <script>
        const video = document.getElementById('videoPlayer');

        // Carga la lista de México automáticamente al abrir la web
        window.onload = () => {
            const primerBoton = document.querySelector('.btn-lista');
            if (primerBoton) primerBoton.click();
        };

        function cargarLista(archivoM3u, boton) {
            document.querySelectorAll('.btn-lista').forEach(btn => btn.classList.remove('activo'));
            boton.classList.add('activo');
            document.getElementById('nombreLista').innerText = `Cargando lista: ${boton.innerText}...`;

            const contenedor = document.getElementById('contenedorCanales');
            contenedor.innerHTML = '';

            fetch(archivoM3u)
                .then(response => {
                    if (!response.ok) throw new Error();
                    return response.text();
                })
                .then(data => {
                    parsearM3U(data);
                    document.getElementById('nombreLista').innerText = `${boton.innerText}`;
                })
                .catch(() => {
                    document.getElementById('nombreLista').innerText = `Error al cargar la lista ${boton.innerText}`;
                });
        }

        function parsearM3U(texto) {
            const lineas = texto.split('\n');
            const contenedor = document.getElementById('contenedorCanales');
            let canalActual = null;

            lineas.forEach(linea => {
                linea = linea.trim();
                
                if (linea.startsWith('#EXTINF:')) {
                    let nombre = "Canal sin nombre";
                    let logo = 'https://placeholder.com';
                    
                    // 1. Intentar buscar logo si existiera en un futuro
                    const infoLogo = linea.match(/tvg-logo="([^"]+)"/);
                    if (infoLogo) logo = infoLogo[1];
                    
                    // 2. Extraer el nombre de forma segura (cortando después de la última coma)
                    const indiceComa = linea.lastIndexOf(',');
                    if (indiceComa !== -1) {
                        nombre = linea.substring(indiceComa + 1).trim();
                    } else {
                        // Respaldo por si no tiene comas
                        nombre = linea.replace('#EXTINF:', '').trim();
                    }
                    
                    canalActual = { nombre, logo };
                } else if (linea.startsWith('http') && canalActual) {
                    canalActual.url = linea;
                    crearTarjetaCanal(canalActual, contenedor);
                    canalActual = null;
                }
            });
        }

        function crearTarjetaCanal(canal, contenedor) {
            const div = document.createElement('div');
            div.className = 'canal';
            div.onclick = () => playCanal(canal.url);
            div.innerHTML = `
                <img src="${canal.logo}" alt="${canal.nombre}" onerror="this.src='https://placeholder.com'">
                <p>${canal.nombre}</p>
            `;
            contenedor.appendChild(div);
        }

        function playCanal(url) {
            if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.style.display = "block";
                video.play().then(() => {
                    if (video.webkitEnterFullscreen) video.webkitEnterFullscreen();
                });
            } else if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                video.style.display = "block";
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().then(() => {
                        if (video.requestFullscreen) video.requestFullscreen();
                    });
                });
            }
        }

        const exitHandler = () => {
            if (!document.fullscreenElement && !document.webkitIsFullScreen) {
                video.pause();
                video.style.display = "none";
                video.src = "";
            }
        };
        document.addEventListener('fullscreenchange', exitHandler);
        document.addEventListener('webkitfullscreenchange', exitHandler);
    </script>
</body>
</html>
