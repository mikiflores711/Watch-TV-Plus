<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Watch TV Plus</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.13/dist/hls.min.js"></script>
<style>
:root{
  --fav:#ffcc00;--mexico:#00a650;--vix:#ff4500;--pluto:#00d2ff;--tubi:#ff9900;
  --espanol:#e50914;--roku:#662d91;--lg:#a50034;--plex:#e5a93b;--runtime:#0055ff;
  --adult:#ff007f;--bg:#121212;--panel:#1a1a1a;--card:#1e1e1e;--line:#2d2d2d;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:var(--bg);color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
body{padding:0 15px 40px;padding-top:var(--header-height,150px);-webkit-text-size-adjust:100%}
button,input{font:inherit}
.header-fijo{position:fixed;inset:0 0 auto 0;z-index:1000;background:var(--bg);box-shadow:0 5px 18px rgba(0,0,0,.8)}
.contenedor-reproductor{display:none;background:#000;position:relative}
.contenedor-reproductor.visible{display:block}
video{width:100%;height:min(42vh,320px);display:block;background:#000;object-fit:contain}
.player-info{position:absolute;left:10px;right:10px;bottom:8px;display:flex;align-items:center;gap:8px;pointer-events:none}
.player-badge{background:rgba(0,0,0,.74);border:1px solid rgba(255,255,255,.15);border-radius:99px;padding:6px 10px;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.contenedor-busqueda{padding:11px 15px;background:var(--panel);border-bottom:1px solid var(--line)}
.barra-busqueda{width:100%;padding:12px 17px;border-radius:25px;border:1px solid #444;background:#2a2a2a;color:#fff;font-size:16px;outline:none;-webkit-appearance:none}
.barra-busqueda:focus{border-color:#805ad5;box-shadow:0 0 0 3px rgba(128,90,213,.2)}
.selector-listas{display:flex;gap:9px;overflow-x:auto;padding:11px 15px;background:var(--bg);scrollbar-width:none;-webkit-overflow-scrolling:touch}
.selector-listas::-webkit-scrollbar{display:none}
.btn-lista{background:#222;color:#ccc;border:2px solid #333;padding:8px 15px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-lista.activo,.btn-lista.iluminado{color:#fff}
.btn-lista[data-cat="favoritos"].activo,.btn-lista[data-cat="favoritos"].iluminado{background:var(--fav);color:#111;border-color:var(--fav)}
.btn-lista[data-cat="mexico"].activo,.btn-lista[data-cat="mexico"].iluminado{background:var(--mexico);border-color:var(--mexico)}
.btn-lista[data-cat="vix"].activo,.btn-lista[data-cat="vix"].iluminado{background:var(--vix);border-color:var(--vix)}
.btn-lista[data-cat="pluto"].activo,.btn-lista[data-cat="pluto"].iluminado{background:var(--pluto);color:#111;border-color:var(--pluto)}
.btn-lista[data-cat="tubi"].activo,.btn-lista[data-cat="tubi"].iluminado{background:var(--tubi);color:#111;border-color:var(--tubi)}
.btn-lista[data-cat="espanol"].activo,.btn-lista[data-cat="espanol"].iluminado{background:var(--espanol);border-color:var(--espanol)}
.btn-lista[data-cat="roku_all"].activo,.btn-lista[data-cat="roku_all"].iluminado{background:var(--roku);border-color:var(--roku)}
.btn-lista[data-cat="LG_Channels_mx"].activo,.btn-lista[data-cat="LG_Channels_mx"].iluminado{background:var(--lg);border-color:var(--lg)}
.btn-lista[data-cat="plex_mx"].activo,.btn-lista[data-cat="plex_mx"].iluminado{background:var(--plex);color:#111;border-color:var(--plex)}
.btn-lista[data-cat="runtime"].activo,.btn-lista[data-cat="runtime"].iluminado{background:var(--runtime);border-color:var(--runtime)}
.btn-lista[data-cat="adult"].activo,.btn-lista[data-cat="adult"].iluminado{background:var(--adult);border-color:var(--adult)}
.estado{max-width:1100px;margin:12px auto 15px;text-align:center;color:#aaa;font-size:13px;min-height:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:12px;max-width:1100px;margin:0 auto}
.canal{min-height:116px;background:var(--card);border-radius:12px;padding:10px;text-align:center;border:2px solid var(--line);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;user-select:none;transition:transform .12s,background .12s,box-shadow .12s}
.canal:hover{background:#272727;box-shadow:0 8px 22px rgba(0,0,0,.34)}
.canal:active{transform:scale(.95)}
.canal.reproduciendo{box-shadow:0 0 0 3px rgba(255,255,255,.18),0 9px 25px rgba(0,0,0,.45)}
.logo-wrap{width:100%;height:62px;border-radius:7px;background:#fff;display:grid;place-items:center;overflow:hidden;margin-bottom:8px}
.logo-wrap.dark{background:#111}
.canal img{width:100%;height:100%;object-fit:contain;padding:5px;display:block}
.canal p{margin:0;font-size:12px;font-weight:600;width:100%;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.3}
.btn-favorito{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.66);border:0;color:#777;font-size:17px;cursor:pointer;border-radius:50%;width:28px;height:28px;display:grid;place-items:center;z-index:3}
.btn-favorito.en-favoritos{color:var(--fav)}
.empty{grid-column:1/-1;text-align:center;color:#777;padding:35px 10px;border:1px dashed #333;border-radius:12px}
@media(max-width:600px){body{padding-left:10px;padding-right:10px}.grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:9px}.canal{min-height:108px;padding:8px}.logo-wrap{height:56px}.selector-listas{padding-left:10px;padding-right:10px}.contenedor-busqueda{padding-left:10px;padding-right:10px}}
</style>
</head>
<body>
<header class="header-fijo" id="headerFijo">
  <div class="contenedor-reproductor" id="wrapperPlayer">
    <video id="videoPlayer" controls playsinline webkit-playsinline></video>
    <div class="player-info"><span class="player-badge" id="playerStatus">Selecciona un canal</span></div>
  </div>
  <div class="contenedor-busqueda">
    <input id="inputBusqueda" class="barra-busqueda" type="search" placeholder="🔍 Buscar canales (excluye adultos)..." autocomplete="off">
  </div>
  <nav class="selector-listas" id="selectorListas">
    <button class="btn-lista" data-cat="favoritos">⭐ Favoritos</button>
    <button class="btn-lista" data-cat="mexico">México</button>
    <button class="btn-lista" data-cat="vix">ViX</button>
    <button class="btn-lista" data-cat="pluto">Pluto</button>
    <button class="btn-lista" data-cat="tubi">Tubi</button>
    <button class="btn-lista" data-cat="espanol">Español</button>
    <button class="btn-lista" data-cat="roku_all">Roku TV</button>
    <button class="btn-lista" data-cat="LG_Channels_mx">LG Channels</button>
    <button class="btn-lista" data-cat="plex_mx">Plex</button>
    <button class="btn-lista" data-cat="runtime">Runtime</button>
    <button class="btn-lista" data-cat="adult">Adultos</button>
  </nav>
</header>
<div class="estado" id="nombreLista">Cargando canales…</div>
<main class="grid" id="contenedorCanales"></main>
<script>
'use strict';
const video=document.getElementById('videoPlayer');
const wrapper=document.getElementById('wrapperPlayer');
const playerStatus=document.getElementById('playerStatus');
const contenedor=document.getElementById('contenedorCanales');
const nombreLista=document.getElementById('nombreLista');
const inputBusqueda=document.getElementById('inputBusqueda');
const headerFijo=document.getElementById('headerFijo');

const BASE_URL=new URL('./',location.href).href;
const PROXY_BASE='https://hls-proxy-tv-plus.mikimc-business.workers.dev/proxy?url=';
const FAVORITES_KEY='tv_favoritos_v3';
const FALLBACK_TIMEOUT=12000;
const PLACEHOLDER='data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180"><rect width="100%" height="100%" fill="#191919"/><text x="50%" y="52%" text-anchor="middle" fill="#aaa" font-family="Arial" font-size="28">TV</text></svg>`);

const LISTAS={
 favoritos:{label:'⭐ Tus canales favoritos',file:null,color:'var(--fav)'},
 mexico:{label:'México',file:'mexico.m3u',color:'var(--mexico)'},
 vix:{label:'ViX',file:'vix.m3u',color:'var(--vix)'},
 pluto:{label:'Pluto TV',file:'pluto.m3u',color:'var(--pluto)'},
 tubi:{label:'Tubi TV',file:'tubi.m3u',color:'var(--tubi)'},
 espanol:{label:'Español',file:'espanol.m3u',color:'var(--espanol)'},
 roku_all:{label:'Roku TV',file:'roku_all.m3u',color:'var(--roku)'},
 LG_Channels_mx:{label:'LG Channels',file:'LG_Channels_mx.m3u',color:'var(--lg)'},
 plex_mx:{label:'Plex',file:'plex_mx.m3u',color:'var(--plex)'},
 runtime:{label:'Runtime',file:'runtime.m3u',color:'var(--runtime)'},
 adult:{label:'Adultos 18+',file:'adult.m3u',color:'var(--adult)',adult:true}
};

let hlsInstance=null, fallbackTimer=null, playbackToken=0, currentChannel=null;
let channelsByCategory={}, todosLosCanales=[], categoriaActual='mexico';
let favoritos=loadFavorites();

function updateHeaderHeight(){document.body.style.setProperty('--header-height',`${headerFijo.offsetHeight+18}px`)}
window.addEventListener('resize',updateHeaderHeight);
new ResizeObserver(updateHeaderHeight).observe(headerFijo);

function loadFavorites(){try{const x=JSON.parse(localStorage.getItem(FAVORITES_KEY)||'[]');return Array.isArray(x)?x:[]}catch{return []}}
function saveFavorites(){localStorage.setItem(FAVORITES_KEY,JSON.stringify(favoritos))}
function escapeHtml(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function normalizeUrl(url){return String(url||'').trim()}
function categoryFromFile(file){return Object.keys(LISTAS).find(k=>LISTAS[k].file===file)||''}

async function fetchText(file){
 const url=new URL(file,BASE_URL);url.searchParams.set('v',Date.now());
 const r=await fetch(url,{cache:'no-store'});if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.text();
}

function parseM3U(text,file,category){
 const lines=String(text||'').replace(/\r/g,'').split('\n');const out=[];let current=null;
 let referrer='',userAgent='',origin='';
 for(let raw of lines){const line=raw.trim();if(!line)continue;
  if(line.startsWith('#EXTVLCOPT:http-referrer=')){referrer=line.split('=').slice(1).join('=').trim();if(current)current.referrer=referrer;continue}
  if(line.startsWith('#EXTVLCOPT:http-user-agent=')){userAgent=line.split('=').slice(1).join('=').trim();if(current)current.userAgent=userAgent;continue}
  if(line.startsWith('#EXTVLCOPT:http-origin=')){origin=line.split('=').slice(1).join('=').trim();if(current)current.origin=origin;continue}
  if(line.startsWith('#EXTINF')){
   const attrs={};for(const m of line.matchAll(/([\w-]+)="([^"]*)"/g))attrs[m[1]]=m[2];
   const comma=line.indexOf(',');const name=(comma>=0?line.slice(comma+1):'Canal sin nombre').trim()||'Canal sin nombre';
   current={name,logo:attrs['tvg-logo']||'',group:attrs['group-title']||'',id:attrs['tvg-id']||'',file,category,referrer,userAgent,origin,logoBg:(attrs['logo-bg']||attrs['tvg-logo-bg']||'white').toLowerCase()};continue;
  }
  if(current&&(line.startsWith('http://')||line.startsWith('https://'))){
   const parts=line.split('|');current.url=parts.shift().trim();
   const opts=new URLSearchParams(parts.join('&'));current.referrer=opts.get('Referer')||opts.get('referrer')||current.referrer;current.userAgent=opts.get('User-Agent')||opts.get('user-agent')||current.userAgent;current.origin=opts.get('Origin')||current.origin;
   out.push(current);current=null;referrer='';userAgent='';origin='';
  }
 }
 const seen=new Set();return out.filter(ch=>ch.url&&!seen.has(ch.url)&&seen.add(ch.url));
}

async function preloadAll(){
 nombreLista.textContent='Cargando todas las listas…';
 const entries=Object.entries(LISTAS).filter(([,v])=>v.file);
 const results=await Promise.all(entries.map(async([key,cfg])=>{try{const text=await fetchText(cfg.file);return[key,parseM3U(text,cfg.file,key),null]}catch(e){return[key,[],e]}}));
 channelsByCategory={};todosLosCanales=[];const errors=[];
 for(const [key,list,error] of results){channelsByCategory[key]=list;todosLosCanales.push(...list);if(error)errors.push(`${LISTAS[key].label}: ${error.message}`)}
 todosLosCanales=[...new Map(todosLosCanales.map(c=>[c.url,c])).values()];
 if(errors.length)console.warn('Listas con error:',errors);
 showCategory('mexico');
}

function setActiveButton(cat){document.querySelectorAll('.btn-lista').forEach(b=>b.classList.toggle('activo',b.dataset.cat===cat));}
function showCategory(cat){
 categoriaActual=cat;inputBusqueda.value='';document.querySelectorAll('.btn-lista').forEach(b=>b.classList.remove('iluminado'));setActiveButton(cat);
 const list=cat==='favoritos'?favoritos:(channelsByCategory[cat]||[]);renderChannels(list);
 nombreLista.textContent=`${LISTAS[cat]?.label||cat} · ${list.length} canales`;
}

function renderChannels(list){
 contenedor.innerHTML='';
 if(!list.length){contenedor.innerHTML='<div class="empty">No hay canales para mostrar en esta sección.</div>';return}
 const frag=document.createDocumentFragment();
 for(const ch of list){
  const card=document.createElement('article');card.className='canal'+(currentChannel?.url===ch.url?' reproduciendo':'');card.style.borderColor=LISTAS[ch.category]?.color||'#2d2d2d';
  const fav=favoritos.some(f=>f.url===ch.url);const dark=['black','dark'].includes(ch.logoBg);
  card.innerHTML=`<button class="btn-favorito ${fav?'en-favoritos':''}" type="button" aria-label="Favorito">★</button><div class="logo-wrap ${dark?'dark':''}"><img loading="lazy" src="${escapeHtml(ch.logo||PLACEHOLDER)}" alt="${escapeHtml(ch.name)}"></div><p>${escapeHtml(ch.name)}</p>`;
  const img=card.querySelector('img');img.onerror=()=>{img.onerror=null;img.src=PLACEHOLDER};
  card.querySelector('.btn-favorito').addEventListener('click',e=>{e.stopPropagation();toggleFavorite(ch);});
  card.addEventListener('click',()=>playChannel(ch));frag.appendChild(card);
 }
 contenedor.appendChild(frag);
}

function toggleFavorite(ch){const i=favoritos.findIndex(f=>f.url===ch.url);if(i>=0)favoritos.splice(i,1);else favoritos.push(ch);saveFavorites();
 if(categoriaActual==='favoritos')showCategory('favoritos');else renderChannels(channelsByCategory[categoriaActual]||[]);
}

function searchChannels(){
 const q=inputBusqueda.value.trim().toLocaleLowerCase('es');document.querySelectorAll('.btn-lista').forEach(b=>b.classList.remove('activo','iluminado'));
 if(!q){showCategory(categoriaActual==='favoritos'?'mexico':categoriaActual);return}
 const list=todosLosCanales.filter(c=>c.category!=='adult'&&(`${c.name} ${c.group}`).toLocaleLowerCase('es').includes(q));
 const cats=new Set(list.map(c=>c.category));for(const cat of cats)document.querySelector(`[data-cat="${CSS.escape(cat)}"]`)?.classList.add('iluminado');
 nombreLista.textContent=`Resultados para “${q}” · ${list.length} canales`;renderChannels(list);
}

function proxyUrl(ch){let u=PROXY_BASE+encodeURIComponent(ch.url);if(ch.referrer)u+='&ref='+encodeURIComponent(ch.referrer);if(ch.userAgent)u+='&ua='+encodeURIComponent(ch.userAgent);if(ch.origin)u+='&origin='+encodeURIComponent(ch.origin);return u}
function destroyPlayback(){clearTimeout(fallbackTimer);if(hlsInstance){hlsInstance.destroy();hlsInstance=null}video.pause();video.removeAttribute('src');video.load()}

function playChannel(ch){
 currentChannel=ch;wrapper.classList.add('visible');updateHeaderHeight();renderChannels(inputBusqueda.value?todosLosCanales.filter(c=>c.category!=='adult'&&(`${c.name} ${c.group}`).toLowerCase().includes(inputBusqueda.value.toLowerCase())):(categoriaActual==='favoritos'?favoritos:(channelsByCategory[categoriaActual]||[])));
 playbackToken++;const token=playbackToken;destroyPlayback();playerStatus.textContent=`${ch.name} · conectando…`;
 const candidates=[];const mixed=location.protocol==='https:'&&ch.url.startsWith('http://');const headers=ch.referrer||ch.userAgent||ch.origin;
 if(!mixed&&!headers)candidates.push({name:'directo',url:ch.url});candidates.push({name:'proxy',url:proxyUrl(ch)});if(mixed||headers)candidates.push({name:'directo',url:ch.url});
 const unique=[...new Map(candidates.map(x=>[x.url,x])).values()];tryCandidate(unique,0,token,ch);
 wrapper.scrollIntoView({behavior:'smooth',block:'start'});
}

function tryCandidate(candidates,index,token,ch){
 if(token!==playbackToken)return;if(index>=candidates.length){playerStatus.textContent=`${ch.name} · señal no disponible o bloqueada`;return}
 const cand=candidates[index];destroyPlayback();playerStatus.textContent=`${ch.name} · probando ${cand.name}`;
 let succeeded=false;
 const success=()=>{if(token!==playbackToken||succeeded)return;succeeded=true;clearTimeout(fallbackTimer);playerStatus.textContent=`${ch.name} · reproduciendo por ${cand.name}`};
 const fail=()=>{if(token!==playbackToken||succeeded)return;clearTimeout(fallbackTimer);tryCandidate(candidates,index+1,token,ch)};
 video.addEventListener('playing',success,{once:true});video.addEventListener('loadeddata',success,{once:true});video.addEventListener('error',fail,{once:true});
 const isHls=/\.m3u8(?:$|[?#])/i.test(ch.url)||/m3u8/i.test(ch.url)||/jmp2\.uk\//i.test(ch.url);
 if(isHls&&Hls.isSupported()){
  hlsInstance=new Hls({enableWorker:true,lowLatencyMode:true,maxBufferLength:25,manifestLoadingMaxRetry:3,levelLoadingMaxRetry:3,fragLoadingMaxRetry:3});
  hlsInstance.loadSource(cand.url);hlsInstance.attachMedia(video);
  hlsInstance.on(Hls.Events.MANIFEST_PARSED,()=>video.play().catch(()=>{}));
  hlsInstance.on(Hls.Events.ERROR,(_,data)=>{if(data.fatal)fail()});
 }else{video.src=cand.url;video.play().catch(()=>{})}
 fallbackTimer=setTimeout(fail,FALLBACK_TIMEOUT);
}

document.getElementById('selectorListas').addEventListener('click',e=>{const b=e.target.closest('.btn-lista');if(b)showCategory(b.dataset.cat)});
inputBusqueda.addEventListener('input',searchChannels);
window.addEventListener('beforeunload',destroyPlayback);
window.addEventListener('DOMContentLoaded',()=>{updateHeaderHeight();preloadAll()});
</script>
</body>
</html>
